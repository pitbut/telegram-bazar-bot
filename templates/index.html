<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#1B2430; --panel:#242F3E; --panel-2:#2C3A4D; --ink:#EDEAE2; --ink-dim:#9AA7B5;
    --saffron:#E8A33D; --brick:#C1442E; --leaf:#5B8C5A; --line:#3A4A5E;
    --paper:#F4F0E4; --paper-ink:#242018;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;}
  .wrap{max-width:720px;margin:0 auto;padding:16px 12px 60px;}
  h1{font-weight:800;letter-spacing:0.5px;font-size:22px;margin:0 0 2px;text-transform:uppercase;}
  .role-badge{display:inline-block;background:var(--panel-2);color:var(--saffron);font-size:12px;padding:3px 10px;border-radius:12px;margin-bottom:10px;}
  .panel{background:var(--panel);border-radius:14px;padding:14px;border:1px solid var(--line);margin-bottom:14px;}
  .add-form{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .add-form input, .add-form select{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);padding:9px 10px;border-radius:8px;font-size:14px;}
  .add-form input[name="name"]{flex:2;min-width:120px;}
  .add-form input[name="qty"]{width:70px;}
  .add-form input[name="price"]{width:90px;}
  .add-form .extra{flex:1 1 100%;display:flex;gap:8px;}
  .add-form .extra input{flex:1;}
  .btn{background:var(--saffron);color:#241C0E;border:none;border-radius:8px;padding:9px 14px;font-weight:700;font-size:14px;cursor:pointer;}
  .btn.secondary{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);}
  .btn.danger{background:var(--brick);color:#fff;}
  .actions-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .item{display:flex;align-items:flex-start;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);}
  .item:last-child{border-bottom:none;}
  .item.bought{opacity:.5;}
  .check{width:22px;height:22px;border-radius:6px;border:2px solid var(--ink-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:transparent;font-size:14px;margin-top:2px;}
  .check.done{background:var(--leaf);border-color:var(--leaf);color:#fff;}
  .item .name{font-size:15px;font-weight:600;}
  .item .meta{font-size:12px;color:var(--ink-dim);margin-top:2px;}
  .item .note-tag{display:inline-block;font-size:11px;background:var(--panel-2);color:var(--saffron);padding:2px 6px;border-radius:6px;margin-top:4px;}
  .item .price{font-weight:700;color:var(--saffron);min-width:70px;text-align:right;}
  .item .unplanned-tag{font-size:10px;background:var(--brick);color:#fff;padding:2px 6px;border-radius:6px;margin-left:6px;}
  .del-btn,.edit-btn{padding:4px 8px;font-size:12px;}
  .empty{color:var(--ink-dim);font-size:14px;padding:16px 0;text-align:center;}
  .receipt{background:var(--paper);color:var(--paper-ink);font-family:"Courier New",monospace;padding:16px;border-radius:10px;}
  .receipt h3{margin:0 0 8px;font-size:14px;letter-spacing:2px;text-align:center;text-transform:uppercase;}
  .receipt hr{border:none;border-top:1px dashed #9c9483;margin:8px 0;}
  .receipt .line{display:flex;justify-content:space-between;font-size:12.5px;margin:3px 0;}
  .receipt .line.total{font-weight:700;font-size:14px;}
  .status-msg{margin-top:8px;padding:8px 10px;border-radius:6px;font-size:12.5px;font-weight:700;text-align:center;}
  .status-msg.over{background:#f1cfc7;color:#7a2314;}
  .status-msg.under{background:#d3e3d2;color:#1f4a1e;}
  .status-msg.flat{background:#e2ddcb;color:#4a4433;}
  .loading{color:var(--ink-dim);font-size:13px;padding:20px;text-align:center;}
  details summary{cursor:pointer;color:var(--ink-dim);font-size:13px;margin-top:8px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>🛒 Список на базар</h1>
  <div class="role-badge" id="role-badge"></div>

  <div id="loading" class="loading">Загрузка...</div>

  <div id="content" style="display:none;">
    <div class="panel">
      <form class="add-form" id="add-form">
        <input name="name" placeholder="Название">
        <input name="qty" type="text" inputmode="decimal" placeholder="Кол-во" value="1">
        <select name="unit">
          <option value="шт">шт</option><option value="кг">кг</option><option value="л">л</option>
          <option value="г">г</option><option value="уп">уп</option>
        </select>
        <input name="price" type="text" inputmode="decimal" placeholder="Цена/ед.">
        <div class="extra">
          <input name="location" placeholder="Где купить (не обязательно): место / ссылка на карту">
        </div>
        <button class="btn" type="submit">Добавить</button>
      </form>
      <div class="actions-row">
        <button class="btn secondary" id="btn-notify">📨 Отправить мужу</button>
        <button class="btn secondary" id="btn-unplanned">+ Внеплановая покупка</button>
        <button class="btn danger" id="btn-finish">Завершить поход</button>
      </div>
      <div id="items-list"></div>
    </div>

    <div class="receipt">
      <h3>Чек похода</h3>
      <div id="receipt-lines"></div>
      <hr>
      <div class="line"><span>План</span><span id="r-plan">0</span></div>
      <div class="line"><span>Факт</span><span id="r-actual">0</span></div>
      <div class="line total"><span>Разница</span><span id="r-diff">0</span></div>
      <div id="r-status" class="status-msg flat">Пока не куплено ничего</div>
    </div>
  </div>
</div>

<script>
const tgApp = window.Telegram ? window.Telegram.WebApp : null;
if (tgApp) { tgApp.ready(); tgApp.expand(); }

const ROLE = "{{ role }}";
document.getElementById('role-badge').textContent = ROLE === 'wife' ? 'Вы: жена' : 'Вы: муж';

const fmt = n => (Math.round(n*100)/100).toLocaleString('ru-RU');
let state = { trip: null, items: [] };

async function api(path, method='GET', body=null){
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return res.json();
}

async function load(){
  const data = await api('/api/trip');
  state.trip = data.trip;
  state.items = data.items;
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  render();
}

function escapeHtml(s){ const d=document.createElement('div'); d.innerText=s||''; return d.innerHTML; }

function totals(){
  let planned=0, actual=0;
  state.items.forEach(i=>{
    if(!i.unplanned) planned += i.qty*i.planned_price;
    if(i.bought) actual += (i.actual_qty||0)*(i.actual_price||0);
  });
  return {planned, actual};
}

function render(){
  const list = document.getElementById('items-list');
  const active = state.items.filter(i=>!i.bought);
  const bought = state.items.filter(i=>i.bought);
  list.innerHTML='';
  if(active.length===0 && bought.length===0){
    list.innerHTML = '<div class="empty">Список пуст.</div>';
  }
  active.forEach(it=>{
    const div = document.createElement('div');
    div.className='item';
    div.innerHTML = `
      <div class="check" data-id="${it.id}"></div>
      <div style="flex:1;">
        <div class="name">${escapeHtml(it.name)}${it.unplanned?'<span class="unplanned-tag">внепланово</span>':''}</div>
        <div class="meta">${it.qty} ${it.unit||'шт'} × ${fmt(it.planned_price)}</div>
        ${it.location ? `<div class="note-tag">📍 ${escapeHtml(it.location)}</div>` : ''}
      </div>
      <div class="price">${fmt(it.qty*it.planned_price)}</div>
      <button class="btn secondary del-btn" data-del="${it.id}">🗑</button>
    `;
    div.querySelector('.check').onclick=()=>markBought(it.id);
    div.querySelector('[data-del]').onclick=()=>deleteItem(it.id);
    list.appendChild(div);
  });
  if(bought.length){
    const details = document.createElement('details');
    details.innerHTML = `<summary>Куплено (${bought.length})</summary>`;
    bought.forEach(it=>{
      const row=document.createElement('div');
      row.className='item bought';
      row.innerHTML = `
        <div class="check done" data-unmark="${it.id}">✓</div>
        <div style="flex:1;">
          <div class="name">${escapeHtml(it.name)}${it.unplanned?'<span class="unplanned-tag">внепланово</span>':''}</div>
          <div class="meta">${it.actual_qty} ${it.unit||'шт'} × ${fmt(it.actual_price)}</div>
        </div>
        <div class="price">${fmt((it.actual_qty||0)*(it.actual_price||0))}</div>
        <button class="btn secondary edit-btn" data-edit="${it.id}">✎</button>
        <button class="btn secondary del-btn" data-del="${it.id}">🗑</button>`;
      row.querySelector('[data-unmark]').onclick=()=>unmarkBought(it.id);
      row.querySelector('[data-edit]').onclick=()=>editActual(it.id);
      row.querySelector('[data-del]').onclick=()=>deleteItem(it.id);
      details.appendChild(row);
    });
    list.appendChild(details);
  }
  renderReceipt();
}

function renderReceipt(){
  const {planned, actual} = totals();
  const diff = actual-planned;
  const bought = state.items.filter(i=>i.bought);
  document.getElementById('receipt-lines').innerHTML = bought.length
    ? bought.map(i=>`<div class="line"><span>${escapeHtml(i.name)}</span><span>${fmt((i.actual_qty||0)*(i.actual_price||0))}</span></div>`).join('')
    : '<div class="line" style="color:#8a8271;">— пока пусто —</div>';
  document.getElementById('r-plan').textContent = fmt(planned);
  document.getElementById('r-actual').textContent = fmt(actual);
  document.getElementById('r-diff').textContent = (diff>0?'+':'')+fmt(diff);
  const statusEl = document.getElementById('r-status');
  if(bought.length===0){ statusEl.className='status-msg flat'; statusEl.textContent='Пока не куплено ничего'; }
  else if(diff>0.01){ statusEl.className='status-msg over'; statusEl.textContent=`Перерасход на ${fmt(diff)}`; }
  else if(diff<-0.01){ statusEl.className='status-msg under'; statusEl.textContent=`Экономия ${fmt(-diff)}`; }
  else { statusEl.className='status-msg flat'; statusEl.textContent='Точно по плану'; }
}

document.getElementById('add-form').addEventListener('submit', async e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const name = String(fd.get('name')||'').trim();
  if(!name){ alert('Введите название товара.'); return; }
  const qty = parseFloat(String(fd.get('qty')||'1').replace(',','.'))||1;
  const price = parseFloat(String(fd.get('price')||'0').replace(',','.'))||0;
  const unit = fd.get('unit');
  const location = String(fd.get('location')||'').trim();
  await api('/api/items','POST',{name, qty, unit, plannedPrice:price, location});
  e.target.reset();
  e.target.qty.value=1;
  await load();
});

async function markBought(id){
  const item = state.items.find(i=>i.id===id);
  await api(`/api/items/${id}`,'PATCH',{bought:1, actualQty:item.qty, actualPrice:item.planned_price});
  await load();
}
async function unmarkBought(id){
  await api(`/api/items/${id}`,'PATCH',{bought:0});
  await load();
}
async function editActual(id){
  const item = state.items.find(i=>i.id===id);
  const priceStr = prompt(`Факт. цена за ед. для "${item.name}":`, item.actual_price);
  if(priceStr===null) return;
  const qtyStr = prompt(`Факт. количество для "${item.name}":`, item.actual_qty);
  if(qtyStr===null) return;
  const price = parseFloat(String(priceStr).replace(',','.'));
  const qty = parseFloat(String(qtyStr).replace(',','.'));
  const patch = {};
  if(!isNaN(price)) patch.actualPrice = price;
  if(!isNaN(qty)) patch.actualQty = qty;
  await api(`/api/items/${id}`,'PATCH',patch);
  await load();
}
async function deleteItem(id){
  if(!confirm('Удалить товар совсем?')) return;
  await api(`/api/items/${id}`,'DELETE');
  await load();
}

document.getElementById('btn-unplanned').onclick=async ()=>{
  const name = prompt('Что купили внепланово?');
  if(!name) return;
  const priceStr = prompt(`Цена за единицу для "${name}":`,'0');
  if(priceStr===null) return;
  const qtyStr = prompt(`Количество для "${name}":`,'1');
  if(qtyStr===null) return;
  const price = parseFloat(String(priceStr).replace(',','.'))||0;
  const qty = parseFloat(String(qtyStr).replace(',','.'))||1;
  await api('/api/items','POST',{name, qty, unit:'шт', plannedPrice:0, unplanned:true});
  const created = await api('/api/trip');
  const newItem = created.items.find(i=>i.name===name && !i.bought);
  if(newItem){
    await api(`/api/items/${newItem.id}`,'PATCH',{bought:1, actualQty:qty, actualPrice:price});
  }
  await load();
};

document.getElementById('btn-notify').onclick=async ()=>{
  await api('/api/notify-husband','POST');
  alert('Список отправлен мужу в Telegram.');
};

document.getElementById('btn-finish').onclick=async ()=>{
  const remaining = state.items.filter(i=>!i.bought).length;
  if(remaining>0 && !confirm(`Не куплено ещё ${remaining} поз. Завершить поход всё равно?`)) return;
  const res = await api('/api/finish','POST');
  alert(`Поход завершён.\nПлан: ${fmt(res.planned)}\nФакт: ${fmt(res.actual)}\nРазница: ${res.diff>0?'+':''}${fmt(res.diff)}`);
  await load();
};

load();
</script>
</body>
</html>
